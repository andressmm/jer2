<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Pastor · Jesús es Rey</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #161921;
    --surface2: #1e2330;
    --border:   rgba(255,255,255,0.06);
    --gold:     #c9a227;
    --gold2:    #e8c354;
    --blue:     #4a82e4;
    --green:    #3ecf8e;
    --rose:     #e05c7a;
    --text:     #f1ede4;
    --muted:    #7a7f8e;
  }

  body {
    font-family: "Outfit", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────────── */
  .panel-header {
    background: linear-gradient(140deg, #1c2e48 0%, #2a4268 100%);
    padding: 28px 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .panel-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .logo-wrap {
    position: relative;
    display: inline-block;
    flex-shrink: 0;
  }
  .logo-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,162,39,0.3);
    animation: spinRing 12s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .logo-img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    background: #fff;
    padding: 3px;
    display: block;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 1px rgba(201,162,39,0.25), 0 4px 16px rgba(0,0,0,0.4);
  }
  .panel-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .panel-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    position: relative;
    z-index: 1;
  }
  .refresh-btn {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    position: relative;
    z-index: 1;
  }
  .refresh-btn:hover { background: rgba(201,162,39,0.15); color: var(--gold); }

  /* ── BODY ───────────────────────────────────────────────────────────────── */
  .panel-body {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── STATS GRID ─────────────────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
  }
  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin: 0 auto 10px;
  }
  .stat-icon.gold  { background: rgba(201,162,39,0.12); color: var(--gold2); }
  .stat-icon.blue  { background: rgba(74,130,228,0.12); color: #7aaaf5; }
  .stat-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.3;
  }

  /* ── DETAILS / SUMMARY POR FECHA ───────────────────────────────────────── */
  .fecha-details { background: transparent; }
  .fecha-summary {
    list-style: none;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .fecha-summary::-webkit-details-marker { display: none; }
  .fecha-summary:hover {
    background: var(--surface2);
    border-color: rgba(201,162,39,0.2);
  }
  .fecha-summary-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .fecha-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(201,162,39,0.12);
    color: var(--gold2);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .fecha-info { min-width: 0; }
  .fecha-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .fecha-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .fecha-summary-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .fecha-badge {
    background: rgba(201,162,39,0.14);
    color: var(--gold2);
    font-size: 13px;
    font-weight: 800;
    padding: 5px 12px;
    border-radius: 99px;
    min-width: 36px;
    text-align: center;
  }
  .summary-arrow {
    font-size: 16px;
    color: var(--muted);
    transition: transform 0.25s ease;
  }
  .fecha-details[open] .fecha-summary {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    border-color: rgba(201,162,39,0.2);
  }
  .fecha-details[open] .summary-arrow {
    transform: rotate(180deg);
    color: var(--gold);
  }
  .fecha-details-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 6px 0;
    animation: detailsFade 0.25s ease;
  }
  @keyframes detailsFade {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LISTADO DE CONTACTOS ───────────────────────────────────────────────── */
  .contacto-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
  }
  .contacto-item:last-child { border-bottom: none; }
  .contacto-item.con-seguimiento {
    background: rgba(62,207,142,0.06);
    border-left: 3px solid rgba(62,207,142,0.35);
    padding-left: 15px;
  }
  .contacto-info {
    flex: 1;
    min-width: 0;
  }
  .contacto-nombre {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contacto-hora {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 1px;
  }
  .contacto-decision {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .decision-fe          { background: rgba(201,162,39,0.14);  color: var(--gold2); }
  .decision-reconciliacion { background: rgba(62,207,142,0.14); color: var(--green); }
  .decision-ninguna     { background: rgba(122,127,142,0.14); color: var(--muted); }
  .decision-otro        { background: rgba(224,92,122,0.14);  color: var(--rose);  }

  /* ── BOTÓN LUPA ─────────────────────────────────────────────────────────── */
  .btn-lupa {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    color: var(--muted);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-lupa:hover {
    background: rgba(201,162,39,0.14);
    color: var(--gold2);
    border-color: rgba(201,162,39,0.25);
  }

  /* ── LOADING / EMPTY ────────────────────────────────────────────────────── */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading i { font-size: 32px; display: block; margin-bottom: 12px; animation: spinLoad 1s linear infinite; }
  @keyframes spinLoad { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

  /* ── MODAL DETALLE TROQUEL ──────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 540px;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: 32px;
  }
  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }

  /* Cabecera del modal */
  .modal-head {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 2;
  }
  .modal-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(201,162,39,0.12);
    border: 1.5px solid rgba(201,162,39,0.25);
    color: var(--gold2);
    font-size: 17px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .modal-head-info { flex: 1; min-width: 0; }
  .modal-head-nombre {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .modal-head-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .modal-close {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: rgba(224,92,122,0.15); color: var(--rose); }

  /* Cuerpo del modal */
  .modal-body { padding: 12px 20px 0; }

  .detalle-section {
    margin-bottom: 16px;
  }
  .detalle-section-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .detalle-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .detalle-row:last-child { border-bottom: none; }
  .detalle-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 100px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .detalle-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    word-break: break-word;
  }
  .detalle-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
  }
  .badge-si  { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge-no  { background: rgba(122,127,142,0.12); color: var(--muted); }

  /* Spinner dentro del modal */
  .modal-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spinLoad 0.8s linear infinite;
  }

  /* ── FOOTER DEL MODAL DE DETALLE ───────────────────────────────────────── */
  .modal-footer {
    padding: 14px 20px 4px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-delegar {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid rgba(74,130,228,0.3);
    background: rgba(74,130,228,0.1);
    color: #7aaaf5;
    font-family: "Outfit", sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-delegar:hover {
    background: rgba(74,130,228,0.18);
    border-color: rgba(74,130,228,0.5);
  }
  .btn-delegar.delegado {
    border-color: rgba(62,207,142,0.3);
    background: rgba(62,207,142,0.08);
    color: var(--green);
  }
  .btn-delegar.delegado:hover {
    background: rgba(62,207,142,0.15);
    border-color: rgba(62,207,142,0.5);
  }

  /* ── MODAL DE DELEGACIÓN ────────────────────────────────────────────────── */
  .modal-delegar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 1100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-delegar-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal-delegar-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 540px;
    padding: 20px 20px 36px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-delegar-overlay.open .modal-delegar-sheet {
    transform: translateY(0);
  }
  .modal-delegar-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 99px;
    margin: 0 auto 18px;
  }
  .modal-delegar-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }
  .modal-delegar-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .modal-delegar-lista {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 50vh;
    overflow-y: auto;
    margin-bottom: 14px;
  }
  .delegar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .delegar-item:hover {
    background: rgba(74,130,228,0.1);
    border-color: rgba(74,130,228,0.25);
  }
  .delegar-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(74,130,228,0.12);
    border: 1.5px solid rgba(74,130,228,0.2);
    color: #7aaaf5;
    font-size: 14px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .delegar-info { flex: 1; min-width: 0; }
  .delegar-nombre {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .delegar-rol {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .btn-cancel-delegar {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: "Outfit", sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel-delegar:hover { background: rgba(255,255,255,0.04); }

  /* Info de delegado actual */
  .delegado-actual {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(62,207,142,0.08);
    border: 1px solid rgba(62,207,142,0.2);
    border-radius: 14px;
    margin-bottom: 14px;
  }
  .delegado-actual-icon { font-size: 22px; flex-shrink: 0; }
  .delegado-actual-nombre { font-size: 13px; font-weight: 700; color: var(--text); }
  .delegado-actual-dni    { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="panel-header">
  <div class="panel-header-left">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="logo-img" src="source/jer.png" alt="Jesús es Rey">
    </div>
    <div>
      <h1 class="panel-title">Panel pastores</h1>
      <p class="panel-sub">Jesús es Rey</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="regresar()" title="Regresar">
    <i class="ti ti-arrow-left"></i>
  </button>
</div>

<div class="panel-body">

  <div class="loading" id="loading">
    <i class="ti ti-loader"></i>
    Cargando datos...
  </div>

  <div id="contenido" style="display:none; flex-direction:column; gap:16px;">

    <!-- RESUMEN GENERAL -->
    <div>
      <p class="section-title">Resumen general</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon gold"><i class="ti ti-file-plus"></i></div>
          <div class="stat-value" id="total-registros">-</div>
          <div class="stat-label">Registros totales</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="ti ti-activity"></i></div>
          <div class="stat-value" id="total-seguimientos">-</div>
          <div class="stat-label">Troqueles con seguimiento</div>
        </div>
      </div>
    </div>

    <!-- LISTADO POR FECHA -->
    <div>
      <p class="section-title">Registros agrupados por día</p>
      <div id="fechas-container" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

  </div><!-- /contenido -->

</div><!-- /panel-body -->


<!-- ── MODAL DETALLE TROQUEL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-detalle" onclick="handleModalOverlay(event)">
  <div class="modal-sheet">

    <div class="modal-head">
      <div class="modal-avatar" id="md-avatar">--</div>
      <div class="modal-head-info">
        <p class="modal-head-nombre" id="md-nombre">Cargando...</p>
        <p class="modal-head-sub" id="md-localidad">—</p>
      </div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>

    <div class="modal-body" id="md-body">
      <div class="modal-loading">
        <div class="spinner"></div>
        Cargando datos...
      </div>
    </div>

    <!-- Footer con botón delegar -->
    <div class="modal-footer">
      <button class="btn-delegar" id="md-btn-delegar" onclick="accionDelegar()">
        <i class="ti ti-share"></i>
        <span id="md-btn-delegar-txt">Delegar contacto</span>
      </button>
    </div>

  </div>
</div>


<!-- ── MODAL DELEGACIÓN ──────────────────────────────────────────────────────── -->
<div class="modal-delegar-overlay" id="modal-delegar" onclick="handleDelegarOverlay(event)">
  <div class="modal-delegar-sheet">
    <div class="modal-delegar-handle"></div>
    <p class="modal-delegar-title" id="delegar-titulo">Delegar contacto</p>
    <p class="modal-delegar-sub" id="delegar-sub">Seleccioná a quién querés delegar este contacto</p>
    <div class="modal-delegar-lista" id="delegar-lista"></div>
    <button class="btn-cancel-delegar" onclick="closeDelegacion()">Cancelar</button>
  </div>
</div>


<script>
const BASE_URL = "https://www.cronomet.com.ar/jer/php";

const DIAS_SEMANA = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES       = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function splitFechaHora(registroStr) {
  if (!registroStr) return { fecha: null, hora: null };
  const [fecha, hora] = registroStr.split(" ");
  return { fecha, hora: hora ? hora.substring(0, 5) : null };
}

function formatFechaLarga(fechaStr) {
  const [y, m, d] = fechaStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return DIAS_SEMANA[dt.getDay()] + " " + d + " de " + MESES[m - 1] + " de " + y;
}

function claseDecision(decision) {
  if (!decision) return "decision-ninguna";
  const d = decision.toLowerCase();
  if (d.includes("fe"))            return "decision-fe";
  if (d.includes("reconcil"))      return "decision-reconciliacion";
  if (d.includes("ninguna"))       return "decision-ninguna";
  return "decision-otro";
}

function regresar() { window.location.href = "index.html"; }

/* ── ESTADO DEL DETALLE ABIERTO ──────────────────────────────────────────────── */

var detalleActual = { id: null, nombre: null, apellido: null, dataentry: null };

/* ── MODAL ──────────────────────────────────────────────────────────────────── */

function abrirDetalle(id, nombre, apellido) {
  var fullname = (apellido + " " + nombre).trim();
  var initials = ((nombre[0] || "") + (apellido[0] || "")).toUpperCase();

  // Guardar estado para delegación
  detalleActual = { id: id, nombre: nombre, apellido: apellido, dataentry: null };

  document.getElementById("md-avatar").textContent    = initials || "?";
  document.getElementById("md-nombre").textContent    = fullname || "Sin nombre";
  document.getElementById("md-localidad").textContent = "Cargando...";
  document.getElementById("md-body").innerHTML =
    '<div class="modal-loading"><div class="spinner"></div>Cargando datos...</div>';

  // Resetear botón delegar mientras carga
  var btnDelegar = document.getElementById("md-btn-delegar");
  btnDelegar.className = "btn-delegar";
  document.getElementById("md-btn-delegar-txt").textContent = "Delegar contacto";

  document.getElementById("modal-detalle").classList.add("open");

  fetch(BASE_URL + "/detallecontacto.php?id=" + encodeURIComponent(id))
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(resp) {
      if (!resp.success) throw new Error(resp.message || "Sin datos");

      var c = resp.data;
      var loc = [c.localidad, c.provincia].filter(Boolean).join(", ");
      document.getElementById("md-localidad").textContent = loc || "—";

      function badge(val) {
        var ok = (val === "Sí" || val === "Si" || val === "sí" || val === "si");
        return ok
          ? '<span class="detalle-badge badge-si">✔ Sí</span>'
          : '<span class="detalle-badge badge-no">No</span>';
      }

      function fila(label, value) {
        return '<div class="detalle-row">' +
          '<span class="detalle-label">' + label + '</span>' +
          '<span class="detalle-value">' + esc(value || "—") + '</span>' +
          '</div>';
      }

      function filaBadge(label, badgeHtml) {
        return '<div class="detalle-row">' +
          '<span class="detalle-label">' + label + '</span>' +
          '<span class="detalle-value">' + badgeHtml + '</span>' +
          '</div>';
      }

      var decisionTxt = c.decision && c.decision.trim() !== "" ? c.decision : "Ninguna";

      // Guardar dataentry y actualizar botón delegar
      detalleActual.dataentry = c.dataentry || null;
      actualizarBtnDelegar(c.dataentry);

      document.getElementById("md-body").innerHTML =

        '<div class="detalle-section">' +
          '<p class="detalle-section-title">Datos personales</p>' +
          fila("Nombre",    (c.nombre  || "") + " " + (c.apellido || "")) +
          fila("Celular",   c.celular) +
          fila("Vía",       c.contacto) +
          fila("Edad/Tipo", c.edad) +
        '</div>' +

        '<div class="detalle-section">' +
          '<p class="detalle-section-title">Ubicación</p>' +
          fila("Dirección", c.direccion) +
          fila("Barrio",    c.barrio) +
          fila("Localidad", c.localidad) +
          fila("Provincia", c.provincia) +
          filaBadge("¿Quiere visita?", badge(c.quierevisita)) +
          filaBadge("¿Casa de paz?",   badge(c.casadepaz)) +
        '</div>' +

        '<div class="detalle-section">' +
          '<p class="detalle-section-title">Decisión y seguimiento</p>' +
          '<div class="detalle-row">' +
            '<span class="detalle-label">Decisión</span>' +
            '<span class="detalle-value">' +
              '<span class="detalle-badge ' + claseDecision(c.decision) + '">' + esc(decisionTxt) + '</span>' +
            '</span>' +
          '</div>' +
          filaBadge("Oración", badge(c.oracion === "si" ? "si" : "no")) +
          fila("Observaciones", c.observaciones) +
        '</div>';
    })
    .catch(function(err) {
      document.getElementById("md-localidad").textContent = "Error";
      document.getElementById("md-body").innerHTML =
        '<div class="modal-loading" style="color:var(--rose)">Error al cargar: ' + esc(err.message) + '</div>';
    });
}

function cerrarModal() {
  document.getElementById("modal-detalle").classList.remove("open");
}

function handleModalOverlay(e) {
  if (e.target === document.getElementById("modal-detalle")) cerrarModal();
}

/* ── DELEGACIÓN ──────────────────────────────────────────────────────────────── */

// El botón siempre muestra "Delegar contacto" sin importar el estado
function actualizarBtnDelegar(dataentry) {
  document.getElementById("md-btn-delegar").className      = "btn-delegar";
  document.getElementById("md-btn-delegar-txt").textContent = "Delegar contacto";
}

// Click en el botón del footer — siempre abre el listado para delegar
function accionDelegar() {
  var id     = detalleActual.id;
  var nombre = (detalleActual.apellido + " " + detalleActual.nombre).trim();
  abrirModalDelegacion(id, nombre);
}

// Abre el modal con lista de usuarios para delegar
function abrirModalDelegacion(id, nombreContacto) {
  document.getElementById("delegar-titulo").textContent = "Delegar contacto";
  document.getElementById("delegar-sub").textContent    = "Seleccioná a quién delegar a " + nombreContacto;

  var lista = document.getElementById("delegar-lista");
  lista.innerHTML = '<div class="modal-loading"><div class="spinner"></div>Cargando usuarios...</div>';

  document.getElementById("modal-delegar").classList.add("open");

  fetch(BASE_URL + "/getusuarios.php")
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(resp) {
      var usuarios = resp.data || resp || [];

      if (!usuarios || usuarios.length === 0) {
        lista.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Sin usuarios disponibles</p>';
        return;
      }

      lista.innerHTML = usuarios.map(function(u) {
        var fullname = ((u.nombre || "") + " " + (u.apellido || "")).trim();
        var initials = ((fullname[0] || "")).toUpperCase() + ((u.apellido || "")[0] || "").toUpperCase();
        return (
          '<div class="delegar-item" onclick="confirmarDelegacion(\'' + esc(u.dni) + '\', \'' + esc(fullname) + '\')">' +
            '<div class="delegar-avatar">' + initials + '</div>' +
            '<div class="delegar-info">' +
              '<p class="delegar-nombre">' + esc(fullname) + '</p>' +
              '<p class="delegar-rol">' + esc(u.rol || "") + '</p>' +
            '</div>' +
            '<i class="ti ti-chevron-right" style="color:var(--muted);font-size:16px;flex-shrink:0;"></i>' +
          '</div>'
        );
      }).join("");
    })
    .catch(function(err) {
      lista.innerHTML = '<p style="color:var(--rose);text-align:center;padding:20px;">Error al cargar: ' + esc(err.message) + '</p>';
    });
}

// Confirma y ejecuta la delegación
function confirmarDelegacion(dniDelegado, nombreDelegado) {
  var nombreContacto = (detalleActual.apellido + " " + detalleActual.nombre).trim();
  if (!confirm("¿Delegar a " + nombreContacto + " a " + nombreDelegado + "?")) return;

  var formData = new FormData();
  formData.append("id_contacto",  detalleActual.id);
  formData.append("dni_delegado", dniDelegado);

  fetch(BASE_URL + "/delegarcontacto.php", {
    method: "POST",
    body:   formData
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.success) {
      closeDelegacion();
      // Actualizar estado local y botón
      detalleActual.dataentry = dniDelegado;
      actualizarBtnDelegar(dniDelegado);
      showToast("✅ Contacto delegado a " + nombreDelegado);
    } else {
      showToast("Error: " + (result.message || "Sin respuesta"));
    }
  })
  .catch(function() {
    showToast("Error de conexión");
  });
}

function closeDelegacion() {
  document.getElementById("modal-delegar").classList.remove("open");
}

function handleDelegarOverlay(e) {
  if (e.target === document.getElementById("modal-delegar")) closeDelegacion();
}

// Toast simple para el panel
function showToast(msg) {
  var t = document.getElementById("toast-panel");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast-panel";
    t.style.cssText = [
      "position:fixed","bottom:32px","left:50%",
      "transform:translateX(-50%) translateY(20px)",
      "background:#1e2330","border:1px solid rgba(62,207,142,0.35)",
      "color:#3ecf8e","font-family:Outfit,sans-serif",
      "font-size:13px","font-weight:600","padding:12px 22px",
      "border-radius:99px","z-index:9999",
      "box-shadow:0 8px 32px rgba(0,0,0,0.4)",
      "opacity:0","transition:opacity 0.2s,transform 0.2s",
      "white-space:nowrap","max-width:90vw","text-align:center"
    ].join(";");
    document.body.appendChild(t);
  }
  t.textContent   = msg;
  t.style.opacity = "1";
  t.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(t._timer);
  t._timer = setTimeout(function() {
    t.style.opacity   = "0";
    t.style.transform = "translateX(-50%) translateY(10px)";
  }, 2200);
}

/* ── FETCH PANEL ─────────────────────────────────────────────────────────────── */

function cargarPanel() {
  document.getElementById("loading").style.display   = "block";
  document.getElementById("contenido").style.display = "none";

  Promise.all([
    fetch(BASE_URL + "/info.php").then(r => r.json()),
    fetch(BASE_URL + "/getseguimientos.php").then(r => r.json()),
    fetch(BASE_URL + "/getusuarios.php").then(r => r.json())
  ])
  .then(function(results) {
    var dataInfo  = results[0];
    var dataSeg   = results[1];
    var dataUsers = results[2];

    dataInfo.seguimientos       = dataSeg.seguimientos       || [];
    dataInfo.total_seguimientos = dataSeg.total_seguimientos || 0;
    dataInfo.usuarios           = dataUsers.data || [];

    renderPanel(dataInfo);
  })
  .catch(function(err) {
    document.getElementById("loading").innerHTML =
      '<i class="ti ti-alert-circle"></i> Error al cargar los datos.';
    console.error(err);
  });
}

/* ── RENDER ──────────────────────────────────────────────────────────────────── */

function renderPanel(data) {
  var registros    = Array.isArray(data) ? data : (data.registros    || []);
  var seguimientos = data.seguimientos || [];
  var usuarios     = data.usuarios     || [];

  // Mapa dni → nombre completo del consolidador
  var mapaUsuarios = {};
  usuarios.forEach(function(u) {
    mapaUsuarios[String(u.dni)] = (u.nombre + " " + u.apellido).trim();
  });

  // Set de ids con seguimiento
  var idsConSeguimiento = new Set(seguimientos.map(function(s) { return String(s.id_contacto); }));

  // Agrupar por fecha
  var grupos = {};
  registros.forEach(function(r) {
    var parts = splitFechaHora(r.registro);
    if (!parts.fecha) return;
    if (!grupos[parts.fecha]) grupos[parts.fecha] = [];
    grupos[parts.fecha].push({
      id:        r.id,
      nombre:    r.nombre    || "",
      apellido:  r.apellido  || "",
      hora:      parts.hora,
      decision:  r.decision,
      dataentry: r.dataentry
    });
  });

  var fechasOrdenadas = Object.keys(grupos).sort(function(a, b) { return b.localeCompare(a); });

  document.getElementById("total-registros").textContent    = registros.length;
  document.getElementById("total-seguimientos").textContent = data.total_seguimientos || seguimientos.length;

  var cont = document.getElementById("fechas-container");

  if (fechasOrdenadas.length === 0) {
    cont.innerHTML = '<div class="empty">Sin registros</div>';
  } else {
    cont.innerHTML = "";

    fechasOrdenadas.forEach(function(fecha, idx) {
      var items = grupos[fecha].sort(function(a, b) {
        return (a.hora || "").localeCompare(b.hora || "");
      });

      var conActividad = items.filter(function(u) { return idsConSeguimiento.has(String(u.id)); }).length;
      var sinActividad = items.length - conActividad;

      // ── Armar HTML de items ───────────────────────────────────────────────
      var listaHtml = items.map(function(u) {
        var decisionTxt        = u.decision && u.decision.trim() !== "" ? u.decision : "Ninguna";
        var tieneSeg           = idsConSeguimiento.has(String(u.id));
        var nombreConsolidador = u.dataentry ? (mapaUsuarios[String(u.dataentry)] || "") : "";

        return (
          '<div class="contacto-item' + (tieneSeg ? " con-seguimiento" : "") + '">' +
            '<div class="contacto-info">' +
              '<div class="contacto-nombre">' + esc(u.apellido) + ' ' + esc(u.nombre) + '</div>' +
              '<div class="contacto-hora">' +
                (nombreConsolidador ? '<b>Cons.:</b> ' + esc(nombreConsolidador) : '') +
                (tieneSeg ? ' <span style="color:var(--green);font-size:10px;font-weight:700;margin-left:6px;">✔ Con seguimiento</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="contacto-decision ' + claseDecision(u.decision) + '">' + esc(decisionTxt) + '</div>' +
            '<button class="btn-lupa" ' +
              'onclick="abrirDetalle(' + esc(u.id) + ',\'' + esc(u.nombre) + '\',\'' + esc(u.apellido) + '\')" ' +
              'title="Ver detalle">' +
              '<i class="ti ti-zoom-in"></i>' +
            '</button>' +
          '</div>'
        );
      }).join("");

      // ── Armar el <details> ────────────────────────────────────────────────
      var details = document.createElement("details");
      details.className = "fecha-details";
      if (idx === 0) details.setAttribute("open", "");

      details.innerHTML =
        '<summary class="fecha-summary">' +
          '<div class="fecha-summary-left">' +
            '<div class="fecha-icon"><i class="ti ti-calendar-event"></i></div>' +
            '<div class="fecha-info">' +
              '<div class="fecha-label">' + formatFechaLarga(fecha) + '</div>' +
              '<div class="fecha-sub">' +
                'Registros: <strong style="color:var(--text)">' + items.length + '</strong>' +
                '&nbsp;·&nbsp;' +
                'Con seg: <strong style="color:var(--green)">' + conActividad + '</strong>' +
                '&nbsp;·&nbsp;' +
                'Sin seg: <strong style="color:var(--rose)">' + sinActividad + '</strong>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="fecha-summary-right">' +
            '<span class="fecha-badge">' + items.length + '</span>' +
            '<i class="ti ti-chevron-down summary-arrow"></i>' +
          '</div>' +
        '</summary>' +
        '<div class="fecha-details-content">' + listaHtml + '</div>';

      cont.appendChild(details);
    });
  }

  document.getElementById("loading").style.display   = "none";
  document.getElementById("contenido").style.display = "flex";
}

/* ── INICIO ──────────────────────────────────────────────────────────────────── */
cargarPanel();
</script>

</body>
</html>
