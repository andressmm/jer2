<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Pastor · Jesús es Rey</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #161921;
    --surface2: #1e2330;
    --border:   rgba(255,255,255,0.06);
    --gold:     #c9a227;
    --gold2:    #e8c354;
    --blue:     #4a82e4;
    --green:    #3ecf8e;
    --rose:     #e05c7a;
    --text:     #f1ede4;
    --muted:    #7a7f8e;
  }

  body {
    font-family: "Outfit", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────────── */
  .panel-header {
    background: linear-gradient(140deg, #1c2e48 0%, #2a4268 100%);
    padding: 28px 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .panel-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .logo-wrap {
    position: relative;
    display: inline-block;
    flex-shrink: 0;
  }
  .logo-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,162,39,0.3);
    animation: spinRing 12s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .logo-img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    background: #fff;
    padding: 3px;
    display: block;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 1px rgba(201,162,39,0.25), 0 4px 16px rgba(0,0,0,0.4);
  }
  .panel-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .panel-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    position: relative;
    z-index: 1;
  }
  .refresh-btn {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    position: relative;
    z-index: 1;
  }
  .refresh-btn:hover { background: rgba(201,162,39,0.15); color: var(--gold); }

  /* ── BODY ───────────────────────────────────────────────────────────────── */
  .panel-body {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── STATS GRID ─────────────────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
  }
  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin: 0 auto 10px;
  }
  .stat-icon.gold  { background: rgba(201,162,39,0.12); color: var(--gold2); }
  .stat-icon.blue  { background: rgba(74,130,228,0.12); color: #7aaaf5; }
  .stat-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.3;
  }

  /* ── DETAILS / SUMMARY POR FECHA ───────────────────────────────────────── */
  .fecha-details {
    background: transparent;
  }
  .fecha-summary {
    list-style: none;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .fecha-summary::-webkit-details-marker { display: none; }
  .fecha-summary:hover {
    background: var(--surface2);
    border-color: rgba(201,162,39,0.2);
  }
  .fecha-summary-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .fecha-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(201,162,39,0.12);
    color: var(--gold2);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .fecha-info {
    min-width: 0;
  }
  .fecha-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .fecha-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .fecha-summary-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .fecha-badge {
    background: rgba(201,162,39,0.14);
    color: var(--gold2);
    font-size: 13px;
    font-weight: 800;
    padding: 5px 12px;
    border-radius: 99px;
    min-width: 36px;
    text-align: center;
  }
  .summary-arrow {
    font-size: 16px;
    color: var(--muted);
    transition: transform 0.25s ease;
  }
  .fecha-details[open] .fecha-summary {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    border-color: rgba(201,162,39,0.2);
  }
  .fecha-details[open] .summary-arrow {
    transform: rotate(180deg);
    color: var(--gold);
  }
  .fecha-details-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 6px 0;
    animation: detailsFade 0.25s ease;
  }
  @keyframes detailsFade {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LISTADO DE CONTACTOS ───────────────────────────────────────────────── */
  .contacto-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
  }
  .contacto-item:last-child { border-bottom: none; }
  .contacto-item.con-seguimiento { background: rgba(62,207,142,0.06); border-left: 3px solid rgba(62,207,142,0.35); padding-left: 15px; }
  .contacto-info {
    flex: 1;
    min-width: 0;
  }
  .contacto-nombre {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contacto-hora {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 1px;
  }
  .contacto-decision {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .decision-fe {
    background: rgba(201,162,39,0.14);
    color: var(--gold2);
  }
  .decision-reconciliacion {
    background: rgba(62,207,142,0.14);
    color: var(--green);
  }
  .decision-ninguna {
    background: rgba(122,127,142,0.14);
    color: var(--muted);
  }
  .decision-otro {
    background: rgba(224,92,122,0.14);
    color: var(--rose);
  }

  /* ── LOADING / EMPTY ────────────────────────────────────────────────────── */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading i { font-size: 32px; display: block; margin-bottom: 12px; animation: spinLoad 1s linear infinite; }
  @keyframes spinLoad { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

  /* ── BLOQUEADO ──────────────────────────────────────────────────────────── */
  .bloqueado { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
  .bloqueado i { font-size: 56px; color: var(--rose); margin-bottom: 20px; }
  .bloqueado h2 { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .bloqueado p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="panel-header">
  <div class="panel-header-left">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="logo-img" src="source/jer.png" alt="Jesús es Rey">
    </div>
    <div>
      <h1 class="panel-title">Panel pastores</h1>
      <p class="panel-sub">Jesús es Rey</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="regresar()" title="Regresar">
    <i class="ti ti-arrow-left"></i>
  </button>
</div>

<div class="panel-body">

  <div class="loading" id="loading">
    <i class="ti ti-loader"></i>
    Cargando datos...
  </div>

  <div id="contenido" style="display:none; flex-direction:column; gap:16px;">

    <!-- RESUMEN GENERAL -->
    <div>
      <p class="section-title">Resumen general</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon gold"><i class="ti ti-file-plus"></i></div>
          <div class="stat-value" id="total-registros">-</div>
          <div class="stat-label">Registros totales</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="ti ti-activity"></i></div>
          <div class="stat-value" id="total-seguimientos">-</div>
          <div class="stat-label">Troqueles con seguimiento</div>
        </div>
      </div>
    </div>

    <!-- LISTADO POR FECHA -->
    <div>
      <p class="section-title">Registros agrupados por día</p>
      <div id="fechas-container" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

  </div><!-- /contenido -->

</div><!-- /panel-body -->

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────
const DIAS_SEMANA = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES       = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function splitFechaHora(registroStr) {
  if (!registroStr) return { fecha: null, hora: null };
  const [fecha, hora] = registroStr.split(" ");
  return { fecha, hora: hora ? hora.substring(0, 5) : null };
}

function formatFechaLarga(fechaStr) {
  const [y, m, d] = fechaStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const diaSemana = DIAS_SEMANA[dt.getDay()];
  return `${diaSemana} ${d} de ${MESES[m - 1]} de ${y}`;
}

function claseDecision(decision) {
  if (!decision) return "decision-ninguna";
  const d = decision.toLowerCase();
  if (d.includes("fe"))                      return "decision-fe";
  if (d.includes("reconcil"))                return "decision-reconciliacion";
  if (d.includes("ninguna") || d === "")     return "decision-ninguna";
  return "decision-otro";
}

function regresar() {
  window.location.href = "index.html";
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
function cargarPanel() {
  document.getElementById("loading").style.display   = "block";
  document.getElementById("contenido").style.display = "none";

  Promise.all([
    fetch("https://www.cronomet.com.ar/jer/php/info.php").then(r => r.json()),
    fetch("https://www.cronomet.com.ar/jer/php/getseguimientos.php").then(r => r.json()),
    fetch("https://www.cronomet.com.ar/jer/php/getusuarios.php").then(r => r.json())
  ])
  .then(function(results) {
    var dataInfo  = results[0];
    var dataSeg   = results[1];
    var dataUsers = results[2];

    dataInfo.seguimientos       = dataSeg.seguimientos       || [];
    dataInfo.total_seguimientos = dataSeg.total_seguimientos || 0;
    // getusuarios devuelve { success: true, data: [...] }
    dataInfo.usuarios           = dataUsers.data || [];

    renderPanel(dataInfo);
  })
  .catch(function(err) {
    document.getElementById("loading").innerHTML =
      '<i class="ti ti-alert-circle"></i> Error al cargar los datos.';
    console.error(err);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPanel(data) {
  const registros    = Array.isArray(data) ? data : (data.registros    || []);
  const seguimientos = data.seguimientos || [];
  const usuarios     = data.usuarios     || [];

  // Mapa dni → nombre completo del consolidador
  const mapaUsuarios = {};
  usuarios.forEach(u => {
    mapaUsuarios[String(u.dni)] = (u.nombre + " " + u.apellido).trim();
  });

  // Set de ids con seguimiento
  const idsConSeguimiento = new Set(seguimientos.map(s => String(s.id_contacto)));

  // Agrupar por fecha
  const grupos = {};
  registros.forEach(r => {
    const { fecha, hora } = splitFechaHora(r.registro);
    if (!fecha) return;
    if (!grupos[fecha]) grupos[fecha] = [];
    grupos[fecha].push({
      id:        r.id,
      nombre:    r.nombre,
      apellido:  r.apellido,
      hora:      hora,
      decision:  r.decision,
      dataentry: r.dataentry
    });
  });

  const fechasOrdenadas = Object.keys(grupos).sort((a, b) => b.localeCompare(a));

  document.getElementById("total-registros").textContent    = registros.length;
  document.getElementById("total-seguimientos").textContent = data.total_seguimientos || seguimientos.length;

  const cont = document.getElementById("fechas-container");

  if (fechasOrdenadas.length === 0) {
    cont.innerHTML = '<div class="empty">Sin registros</div>';
  } else {
    cont.innerHTML = fechasOrdenadas.map((fecha, idx) => {
      const items = grupos[fecha].sort((a, b) => (a.hora || "").localeCompare(b.hora || ""));

      const conActividad = items.filter(u => idsConSeguimiento.has(String(u.id))).length;
      const sinActividad = items.length - conActividad;

      const listaHtml = items.map(u => {
        const decisionTxt = u.decision && u.decision.trim() !== "" ? u.decision : "Ninguna";
        const tieneSeg    = idsConSeguimiento.has(String(u.id));

        // Resolver nombre del consolidador desde el mapa de usuarios
        const nombreConsolidador = u.dataentry
          ? (mapaUsuarios[String(u.dataentry)] || "")
          : "";

        return `
          <div class="contacto-item ${tieneSeg ? "con-seguimiento" : ""}">
            <div class="contacto-info">
              <div class="contacto-nombre">${u.apellido} ${u.nombre}</div>
              <div class="contacto-hora">
                ${nombreConsolidador ? "<b>Cons.:</b> " + nombreConsolidador : ""}
                ${tieneSeg ? ' <span style="color:var(--green);font-size:10px;font-weight:700;margin-left:6px;">✔ Con seguimiento</span>' : ''}
              </div>
            </div>
            <div class="contacto-decision ${claseDecision(u.decision)}">${decisionTxt}</div>
          </div>`;
      }).join("");

      const openAttr = idx === 0 ? "open" : "";

      return `
        <details class="fecha-details">
          <summary class="fecha-summary">
            <div class="fecha-summary-left">
              <div class="fecha-icon"><i class="ti ti-calendar-event"></i></div>
              <div class="fecha-info">
                <div class="fecha-label">${formatFechaLarga(fecha)}</div>
                <div class="fecha-sub">
                  Registros: <strong style="color:var(--text)">${items.length}</strong>
                  &nbsp;·&nbsp;
                  Con seg: <strong style="color:var(--green)">${conActividad}</strong>
                  &nbsp;·&nbsp;
                  Sin seg: <strong style="color:var(--rose)">${sinActividad}</strong>
                </div>
              </div>
            </div>
            <div class="fecha-summary-right">
              <span class="fecha-badge">${items.length}</span>
              <i class="ti ti-chevron-down summary-arrow"></i>
            </div>
          </summary>
          <div class="fecha-details-content">
            ${listaHtml}
          </div>
        </details>`;
    }).join("");
  }

  document.getElementById("loading").style.display   = "none";
  document.getElementById("contenido").style.display = "flex";
}

// ── INICIO ────────────────────────────────────────────────────────────────────
cargarPanel();
</script>

</body>
</html>
